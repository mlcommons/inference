# User configuration for MLPerf Loadgen
# The format of this config file is 'key = value'.
# The key has the format 'model.scenario.key'. Value is mostly int64_t.
# Model maybe '*' as wildcard. In that case the value applies to all models.
# All times are in milliseconds

# RAG-QnA workload configuration
# For multi-hop RAG queries with iterative retrieval

# Offline scenario settings
# min_query_count takes priority - loadgen will run AT LEAST this many unique queries
# min_duration is secondary - only matters if fewer queries would complete faster
# max_async_queries controls concurrent query processing (default: 1)
e2e-rag-qna.Offline.target_qps = 0.11
e2e-rag-qna.Offline.min_duration = 0
e2e-rag-qna.Offline.min_query_count = 824
e2e-rag-qna.Offline.max_async_queries = 10

# RAG DB workload settings
# Send all documents at once for parallel processing
e2e-rag-db.Offline.target_qps = 0
e2e-rag-db.Offline.min_duration = 0
e2e-rag-db.Offline.min_query_count = 2515
e2e-rag-db.Offline.max_async_queries = 2515
